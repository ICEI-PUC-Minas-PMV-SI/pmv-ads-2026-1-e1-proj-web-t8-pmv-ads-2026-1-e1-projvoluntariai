    <h1 id="tit_1" class="titulo1"> 
        Cadastrar vagas 
</h1>
<p id="p_1">
    Cadastre oportunidades de voluntariado
</p>
<div class="formulario1">
<h2 id="tit_2" class="titulos">
    Etapa 1-Informações Gerais
</h2>
<div class="formulario">
<form method="post" id="formVaga">
<label>Título da vaga<span>*</span></label>
<textarea id="tituloDaVaga" rows="1" cols="70"></textarea>
 <label>Modalidades<span id="asterisco">*</span></label>
<select id="opcModalidades" aria-colspan="70">
<option value=""></option>
    <option value="remoto">Remoto</option>              
<option value="presencial">Presencial</option>
<option value="hibrido">Híbrido</option>
</select>
<label>Localização<span>*</span></label>
<textarea id="localizacao" rows="1" cols="70"></textarea>
<label>Número de Vagas<span>*</span></label>
<input type="number" id="numeroVagas"> 
</div>
</div>
<div class="botoes">
<br><button class="cancelar" type="reset" id="btnCancelar">Cancelar</button></br>
<button class="salvar" type="submit" id="btnSalvar">Salvar Dados</button>
</div>
</form>
<script src="script.js"></script>
</body>
</html>
